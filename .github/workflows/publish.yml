name: Release - Build, cross-OS validate, publish to PyPI

# Tag-driven release pipeline. A pushed v* tag fans out into:
#   build -> cross-os-tests (3 OS x 4 Python = 12) -> publish
# Any matrix combo failure breaks the needs: chain so PyPI publish does
# not run unless every supported (OS, Python) pair installs the packaged
# wheel cleanly and runs the test suite green.

on:
  push:
    tags: ['v*']

# No workflow-level permissions; each job declares the minimum it needs.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # checkout reads the tagged ref
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel + sdist
        run: python -m build  # outputs dist/*.whl and dist/*.tar.gz

      - name: Verify package metadata
        run: |
          python -m pip install twine
          twine check dist/*

      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  cross-os-tests:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read  # checkout reads the tagged ref for tests/ + tools/
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - name: Install packaged wheel (NOT editable)
        shell: bash  # POSIX shell on Windows runners too
        run: |
          # Install exactly what PyPI users will pip install. Transitive
          # dependencies resolve from PyPI; the local dist/ only contains
          # the forgelm wheel, not its dependency closure (so no
          # --no-index --find-links here).
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl

      - name: Install Linux-only extras (qlora, ingestion, eval)
        if: runner.os == 'Linux'
        shell: bash
        # qlora pulls bitsandbytes which only ships Linux wheels.
        # ingestion + eval are cross-platform but bundled here so a single
        # conditional install covers the breadth-test surface on Linux.
        run: python -m pip install 'forgelm[qlora,ingestion,eval]'

      - name: Install pytest
        shell: bash
        run: python -m pip install pytest pytest-cov

      - name: Test (CPU-only, no-network)
        shell: bash
        # Drift-sensitive tests (test_cost_estimation: snapshot pricing
        # fixture on a different cadence than the release matrix) are
        # excluded via the @pytest.mark.fixture_drift marker — F-P8-C-20
        # made the marker the single source of truth, so no filename guard
        # is needed: a renamed/removed test simply keeps (or drops) the
        # marker, and the exclusion follows the marker, not a brittle path.
        run: pytest tests/ -q -m 'not fixture_drift'

      - name: Generate SBOM (CycloneDX 1.5)
        shell: bash
        run: python tools/generate_sbom.py > sbom-${{ matrix.os }}-py${{ matrix.python }}.json

      - uses: actions/upload-artifact@v5
        with:
          name: sbom-${{ matrix.os }}-py${{ matrix.python }}
          path: sbom-${{ matrix.os }}-py${{ matrix.python }}.json

  publish:
    needs: cross-os-tests  # blocked until every matrix combo is green
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/forgelm
    permissions:
      contents: read       # download-artifact reads workflow run state
      id-token: write      # OIDC trusted publishing to PyPI
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # Pinned by commit SHA for supply-chain integrity (SonarCloud S7637 /
        # OpenSSF Scorecard "pinned-dependencies"). The pin maps to PyPA's
        # v1.14.0 release; bump deliberately when upgrading.
        # v1.9.0 → v1.14.0: v1.9.0 bundled a pkginfo/twine that rejected
        # Metadata-Version 2.4 wheels (setuptools ≥77 emits 2.4 for PEP 639
        # license expressions) with "Metadata is missing required fields:
        # Name, Version"; v1.14.0 parses 2.4 correctly.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
